version: '3.8'

services:
  grug-orchestrator:
    build: .
    container_name: grug_core
    user: "1000:1000"
    ports:
      # Backlog.md dashboard — access at http://localhost:6420
      - "${BACKLOG_DASHBOARD_PORT:-6420}:6420"
    volumes:
      # Mount the local brain directory to the container so MD files persist
      - ./brain:/app/brain
      # Mount backlog task data so project board persists across rebuilds
      - ./backlog:/app/backlog
      # Mount AWS/GCP credentials strictly read-only if CLI tools need them later
      # - ~/.aws:/home/grug/.aws:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DOCKER=True
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      # Backlog.md working directory — CLI will find the project under /app/backlog
      - BACKLOG_CWD=${BACKLOG_CWD:-/app}
      - BACKLOG_DASHBOARD_PORT=${BACKLOG_DASHBOARD_PORT:-6420}
    restart: unless-stopped
